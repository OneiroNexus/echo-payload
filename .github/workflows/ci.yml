name: CI — Validate Packets & Scripts

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Repo Health Check
    steps:
      - uses: actions/checkout@v4
      - name: Run doctor.sh
        run: bash doctor.sh

  validate-packets:
    runs-on: ubuntu-latest
    name: Validate Packet Format
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check all 10 packets exist and have CORRECT/INCORRECT labels
        run: |
          python3 -c "
          import sys
          from pathlib import Path
          errors = []
          for f in sorted(Path('packets').glob('[0-9][0-9]-*.md')):
              text = f.read_text()
              if 'CORRECT' not in text or 'INCORRECT' not in text:
                  errors.append(f'{f.name}: missing labels')
          if errors:
              for e in errors: print(f'FAIL: {e}')
              sys.exit(1)
          print(f'OK: {len(list(Path(\"packets\").glob(\"[0-9][0-9]-*.md\")))} packets validated')
          "

  lint-python:
    runs-on: ubuntu-latest
    name: Lint Python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check evals/ scripts/ --ignore E501
